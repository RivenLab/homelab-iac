---
- name: Clean existing certificates if requested
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/postgresql/certs
    - /etc/patroni/certs
    - /etc/etcd/tls
    - /home/postgres/certs
    - /home/postgres/patroni-certs
    - /root/certs
  when: clean_certificates | default(false)


- name: Install OpenSSL
  ansible.builtin.apt:
    name: openssl
    state: present
    update_cache: true


- name: Create postgres group
  ansible.builtin.group:
    name: postgres
    system: yes
    state: present


- name: Create postgres user
  ansible.builtin.user:
    name: postgres
    system: yes
    shell: /bin/bash
    home: /var/lib/postgresql
    create_home: yes
    group: postgres
    state: present


- name: Create etcd group
  ansible.builtin.group:
    name: etcd
    system: yes
    state: present


- name: Create etcd user
  ansible.builtin.user:
    name: etcd
    system: yes
    shell: /bin/false
    home: /var/lib/etcd
    create_home: yes
    group: etcd
    state: present


- name: Create PostgreSQL SSL certificates directory
  ansible.builtin.file:
    path: /etc/postgresql/certs
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'


- name: Create Patroni SSL certificates directory
  ansible.builtin.file:
    path: /etc/patroni/certs
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'


- name: Create etcd TLS certificates directory
  ansible.builtin.file:
    path: /etc/etcd/tls
    state: directory
    owner: etcd
    group: etcd
    mode: '0755'

- name: Create PostgreSQL client certificates directory for postgres user
  ansible.builtin.file:
    path: /home/postgres/certs
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'


- name: Create Patroni client certificates directory for postgres user
  ansible.builtin.file:
    path: /home/postgres/patroni-certs
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'


# PostgreSQL CA and Server Certificates

# === GÉNÉRATION CENTRALISÉE DE LA CA PostgreSQL (une seule fois) ===
- name: Generate centralized PostgreSQL CA
  block:
    - name: Create local PostgreSQL CA directory on controller
      ansible.builtin.file:
        path: /tmp/postgresql_cluster/postgresql_ca
        state: directory
      delegate_to: localhost
      become: no
      run_once: true

    - name: Generate PostgreSQL CA private key (once on controller)
      ansible.builtin.openssl_privatekey:
        path: /tmp/postgresql_cluster/postgresql_ca/root.key
        size: 4096
      delegate_to: localhost
      become: no
      run_once: true

    - name: Create PostgreSQL CA config file
      ansible.builtin.copy:
        content: |
          [req]
          distinguished_name = req_distinguished_name
          req_extensions = v3_ca
          x509_extensions = v3_ca
          prompt = no

          [req_distinguished_name]
          C = CH
          ST = geneve
          L = geneve
          O = geneve
          CN = geneve PostgreSQL CA

          [v3_ca]
          basicConstraints = critical,CA:TRUE
          keyUsage = critical,keyCertSign,cRLSign
          subjectKeyIdentifier = hash
        dest: /tmp/postgresql_cluster/postgresql_ca/root.cnf
        mode: '0644'
      delegate_to: localhost
      become: no
      run_once: true

    - name: Generate PostgreSQL CA certificate (once on controller)
      ansible.builtin.shell: |
        openssl req -new -x509 -days 3650 -sha256 -key /tmp/postgresql_cluster/postgresql_ca/root.key \
          -out /tmp/postgresql_cluster/postgresql_ca/root.crt \
          -subj "/C=CH/ST=geneve/L=geneve/O=geneve/CN=geneve PostgreSQL CA" \
          -extensions v3_ca \
          -config /tmp/postgresql_cluster/postgresql_ca/root.cnf
      args:
        creates: /tmp/postgresql_cluster/postgresql_ca/root.crt
      delegate_to: localhost
      become: no
      run_once: true

# === COPIE DE LA CA POSTGRESQL PARTAGÉE SUR TOUS LES NŒUDS ===
- name: Copy PostgreSQL CA certificate from controller
  ansible.builtin.copy:
    src: /tmp/postgresql_cluster/postgresql_ca/root.crt
    dest: /etc/postgresql/certs/root.crt
    owner: postgres
    group: postgres
    mode: '0644'
  become: yes

- name: Copy PostgreSQL CA private key from controller
  ansible.builtin.copy:
    src: /tmp/postgresql_cluster/postgresql_ca/root.key
    dest: /etc/postgresql/certs/root.key
    owner: postgres
    group: postgres
    mode: '0600'
  become: yes

# === GÉNÉRATION DES CERTIFICATS SERVEUR POSTGRESQL (par nœud) ===
- name: Generate PostgreSQL server private key
  ansible.builtin.openssl_privatekey:
    path: /etc/postgresql/certs/server.key
    size: 2048
  become: yes

- name: Generate PostgreSQL server certificate signing request
  ansible.builtin.openssl_csr:
    path: /etc/postgresql/certs/server.csr
    privatekey_path: /etc/postgresql/certs/server.key
    common_name: "{{ inventory_hostname }}"
    organization_name: "geneve"
    country_name: "CH"
    state_or_province_name: "geneve"
    locality_name: "geneve"
    email_address: "admin@novalib.ch"
    subject_alt_name: "DNS:{{ inventory_hostname }},DNS:localhost,IP:{{ ansible_host }},IP:127.0.0.1{% for host in groups['postgres_cluster_hosts'] %},DNS:{{ hostvars[host]['inventory_hostname'] }},IP:{{ hostvars[host]['ansible_host'] }}{% endfor %},IP:{{ vip_manager_vip }}{% for network in external_networks %},IP:{{ network.split('/')[0] }}{% endfor %}"
  become: yes

- name: Create PostgreSQL server extfile
  ansible.builtin.copy:
    content: |
      [v3_server]
      basicConstraints = CA:FALSE
      keyUsage = digitalSignature,keyEncipherment
      extendedKeyUsage = serverAuth
      subjectAltName = DNS:{{ inventory_hostname }},DNS:localhost,IP:{{ ansible_host }},IP:127.0.0.1{% for host in groups['postgres_cluster_hosts'] %},DNS:{{ hostvars[host]['inventory_hostname'] }},IP:{{ hostvars[host]['ansible_host'] }}{% endfor %},IP:{{ vip_manager_vip }}{% for network in external_networks %},IP:{{ network.split('/')[0] }}{% endfor %}
    dest: /etc/postgresql/certs/server.ext
    mode: '0644'
  become: yes

- name: Generate PostgreSQL server certificate
  ansible.builtin.shell: |
    openssl x509 -req -in /etc/postgresql/certs/server.csr \
      -CA /etc/postgresql/certs/root.crt \
      -CAkey /etc/postgresql/certs/root.key \
      -CAcreateserial \
      -out /etc/postgresql/certs/server.crt \
      -days 3650 \
      -sha256 \
      -extensions v3_server \
      -extfile /etc/postgresql/certs/server.ext
  args:
    creates: /etc/postgresql/certs/server.crt
  become: yes

- name: Fix PostgreSQL server certificate permissions
  ansible.builtin.file:
    path: /etc/postgresql/certs/server.crt
    mode: '0644'
    owner: postgres
    group: postgres
  become: yes

- name: Fix PostgreSQL server private key permissions
  ansible.builtin.file:
    path: /etc/postgresql/certs/server.key
    mode: '0600'
    owner: postgres
    group: postgres
  become: yes



