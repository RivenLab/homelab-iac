- name: Install dependencies via apt
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-psycopg2
      - wget
      - gnupg
    update_cache: true


- name: Adding GPG-key PostgreSQL
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/trusted.gpg.d/postgresql.asc
    mode: '0644'


- name: Adding apt repository PostgreSQL
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/trusted.gpg.d/postgresql.asc] http://apt.postgresql.org/pub/repos/apt {{ ansible_lsb.codename }}-pgdg main"
    state: present
    filename: "pgdg"


- name: Update apt
  ansible.builtin.apt:
    update_cache: true


- name: Install PostgreSQL {{ postgresql_version }}
  ansible.builtin.apt:
    name:
      - postgresql-{{ postgresql_version }}
      - postgresql-contrib-{{ postgresql_version }}
    state: present


- name: Stop PostgreSQL service
  ansible.builtin.systemd:
    name: postgresql@{{ postgresql_version }}-main
    state: stopped
    enabled: no
    daemon_reload: yes


- name: Mask PostgreSQL service to prevent auto-start
  ansible.builtin.systemd:
    name: postgresql@{{ postgresql_version }}-main
    masked: yes


- name: Remove auto-initialized cluster
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: absent


- name: Create empty PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ postgresql_data_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
    recurse: true