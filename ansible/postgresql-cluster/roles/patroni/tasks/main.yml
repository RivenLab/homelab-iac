# tasks/main.yml for Patroni role

# ────────────────────────────────────────────────
# Installation
# ────────────────────────────────────────────────
- name: Install Patroni (Debian/Ubuntu)
  ansible.builtin.apt:
    name: patroni
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags: [patroni_install]

- name: Install Patroni + etcd backend (RHEL/CentOS/Rocky)
  ansible.builtin.dnf:
    name:
      - patroni
      - patroni-etcd
    state: present
  when: ansible_os_family == "RedHat"
  tags: [patroni_install]

# ────────────────────────────────────────────────
# Répertoires & logs
# ────────────────────────────────────────────────
- name: Ensure /etc/patroni directory exists with correct permissions
  ansible.builtin.file:
    path: /etc/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"
  tags: [patroni_conf, always]

- name: Create Patroni log directory
  ansible.builtin.file:
    path: /var/log/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"
  tags: [patroni_conf, always]

# ────────────────────────────────────────────────
# Logrotate
# ────────────────────────────────────────────────
- name: Create config for patroni logrotate
  ansible.builtin.copy:
    dest: /etc/logrotate.d/patroni
    mode: '0644'
    content: |
      /var/log/patroni/patroni.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0640 postgres postgres
      }
  tags: patroni_logrotate

# ────────────────────────────────────────────────
# Configuration Patroni
# ────────────────────────────────────────────────
- name: Deploy Patroni config file
  ansible.builtin.template:
    src: patroni.yml.j2
    dest: /etc/patroni/config.yml
    owner: postgres
    group: postgres
    mode: '0640'
    backup: true
  notify: restart patroni
  tags: patroni_conf

# ────────────────────────────────────────────────
# Service
# ────────────────────────────────────────────────
- name: Enable and start Patroni service
  ansible.builtin.systemd:
    name: patroni
    state: started
    enabled: true
    daemon_reload: true
  tags: patroni_service

- name: Wait for Patroni to be ready (PostgreSQL port)
  ansible.builtin.wait_for:
    port: "{{ postgresql_port | default(5432) }}"
    host: "{{ ansible_host }}"
    delay: 15
    timeout: 120
  retries: 3
  delay: 5
  tags: patroni_service

# ────────────────────────────────────────────────
# pg_hba.conf
# ────────────────────────────────────────────────
- name: Update pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_config_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify:
    - reload postgres
    - check pending restart params
  tags: pg_hba
