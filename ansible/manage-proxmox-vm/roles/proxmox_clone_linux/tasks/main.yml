---
- name: Clone VM from template
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.1.vmid }}"
    newid: "{{ item.1.vmid_cloned }}"
    clone: "{{ item.0.template }}"
    name: "{{ item.1.name }}"
    storage: "{{ proxmox_storage }}"
    state: present
    timeout: 600
  loop: "{{ vm_templates | subelements('vms') }}"
  delegate_to: localhost

- name: Configure Cloud-Init settings
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.1.vmid_cloned }}"
    name: "{{ item.1.name }}"
    update: true
    cores: "{{ item.1.cpu }}"
    memory: "{{ item.1.ram }}"
    ipconfig:
      ipconfig0: "ip={{ item.1.network.ip }},gw={{ item.1.network.gateway }}"
    nameservers: "{{ item.1.network.dns_servers }}"
    searchdomains: "{{ item.1.hostname }}"
    ciuser: "{{ vm_connection_user }}"
    sshkeys: "{{ vm_connection_ssh_pubkey }}"
  loop: "{{ vm_templates | subelements('vms') }}"
  delegate_to: localhost

- name: Start VMs
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ item.1.vmid_cloned }}"
    name: "{{ item.1.name }}"
    state: started
  loop: "{{ vm_templates | subelements('vms') }}"
  delegate_to: localhost
