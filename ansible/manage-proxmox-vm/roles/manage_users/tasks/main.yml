---
- name: Wait for SSH to be available
  ansible.builtin.wait_for:
    host: "{{ inventory_hostname }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  delegate_to: localhost

- name: Gather facts
  ansible.builtin.setup:
  when: ansible_facts['os_family'] is not defined

- name: Remove packer user if present
  become: true
  ansible.builtin.user:
    name: packer
    state: absent
    remove: true

- name: Remove /etc/sudoers.d/packer
  become: true
  ansible.builtin.file:
    path: /etc/sudoers.d/packer
    state: absent

- name: Check if user already exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ linux_user | default('dragon') }}"
    fail_key: false
  register: user_check
  changed_when: false

- name: Create target user
  become: true
  ansible.builtin.user:
    name: "{{ linux_user | default('dragon') }}"
    comment: "Local admin user created by Ansible"
    shell: /bin/bash
    groups: "{{ 'wheel' if ansible_facts['os_family'] == 'RedHat' else 'sudo' }}"
    password: "{{ (linux_user_password | default('changeme')) | password_hash('sha512') }}"
    state: present
    create_home: true
  when: user_check.ansible_facts.getent_passwd[linux_user | default('dragon')] is none
  no_log: true

- name: Create .ssh directory for the user
  become: true
  ansible.builtin.file:
    path: "/home/{{ linux_user | default('dragon') }}/.ssh"
    state: directory
    owner: "{{ linux_user | default('dragon') }}"
    group: "{{ linux_user | default('dragon') }}"
    mode: '0700'

- name: Add authorized SSH key for the user
  become: true
  ansible.posix.authorized_key:
    user: "{{ linux_user | default('dragon') }}"
    state: present
    key: "{{ linux_ssh_pubkey | default(lookup('file', '~/.ssh/id_ed25519.pub')) }}"
